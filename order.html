<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科達製藥股份有限公司產品訂購單</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.75;
  color: #222;
  background: #f5f5f5;
  padding: 20px 10px;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  background: #fff;
  padding: 28px 24px;
  border: 1px solid #ddd;
}
/* ---- HEADER ---- */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 2px solid #2d6a4f;
  gap: 16px;
}
.page-header h1 {
  font-size: 20px;
  font-weight: 700;
  color: #1a3d2b;
}
.contact-box {
  font-size: 12px;
  color: #444;
  text-align: right;
  line-height: 1.9;
}
.deadline-badge {
  display: inline-block;
  background: #fff8e1;
  border: 1px solid #f9a825;
  color: #7a5000;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 3px;
  margin-top: 8px;
}

/* ---- TABLE ---- */
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
  font-size: 13px;
}
th, td {
  border: 1px solid #ccc;
  padding: 6px 8px;
  text-align: center;
  vertical-align: middle;
}
th {
  background: #2d6a4f;
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
}
tr:nth-child(even) td { background: #f9f9f9; }
tr:hover td { background: #eef6f1; }
td.product-name { text-align: left; }
.sale-price { color: #c0392b; font-weight: 700; }
input[type="number"] {
  width: 62px;
  padding: 4px 6px;
  border: 1px solid #bbb;
  border-radius: 3px;
  text-align: center;
  font-size: 13px;
  font-family: inherit;
}
input[type="number"]:focus {
  outline: none;
  border-color: #2d6a4f;
  box-shadow: 0 0 0 2px rgba(45,106,79,.15);
}
.subtotal-cell { font-weight: 600; color: #1a3d2b; }

/* ---- TOTAL SECTION ---- */
.total-section {
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 16px 20px;
  margin-bottom: 20px;
  background: #f9fdf9;
}
.total-row {
  display: flex;
  justify-content: flex-end;
  align-items: baseline;
  padding: 3px 0;
  gap: 12px;
}
.total-row .label {
  color: #555;
  font-size: 13px;
  min-width: 80px;
  text-align: right;
}
.total-row .value {
  min-width: 110px;
  text-align: right;
  font-weight: 600;
  font-size: 14px;
}
.total-row.grand {
  border-top: 2px solid #2d6a4f;
  margin-top: 10px;
  padding-top: 12px;
}
.total-row.grand .label { font-size: 15px; font-weight: 700; color: #222; }
.total-row.grand .value { font-size: 22px; color: #c0392b; }
.shipping-note {
  text-align: right;
  font-size: 12px;
  color: #777;
  margin-top: 6px;
}

/* ---- CUSTOMER FORM ---- */
.section-title {
  font-size: 15px;
  font-weight: 700;
  color: #1a3d2b;
  border-bottom: 1px solid #ddd;
  padding-bottom: 6px;
  margin-bottom: 14px;
}
.form-row {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
  min-width: 160px;
}
.form-group label {
  font-size: 13px;
  font-weight: 600;
  color: #444;
}
.form-group input, .form-group textarea {
  padding: 8px 10px;
  border: 1px solid #ccc;
  border-radius: 3px;
  font-size: 14px;
  font-family: inherit;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none;
  border-color: #2d6a4f;
  box-shadow: 0 0 0 2px rgba(45,106,79,.12);
}

/* ---- PAYMENT INFO ---- */
.payment-info {
  background: #f4f4f4;
  border-left: 3px solid #2d6a4f;
  padding: 10px 14px;
  font-size: 13px;
  color: #333;
  margin-bottom: 20px;
  line-height: 1.9;
}
.payment-info strong { display: block; margin-bottom: 2px; font-size: 13px; }

/* ---- SUBMIT ---- */
.submit-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: #2d6a4f;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 1px;
  transition: background .2s;
}
.submit-btn:hover { background: #1e4d38; }
.submit-btn:disabled { background: #999; cursor: not-allowed; }
.error-msg {
  color: #c0392b;
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 18px;
}

/* ---- CONFIRMATION VIEW ---- */
#confirm-view { display: none; }
.confirm-header {
  text-align: center;
  padding: 20px 0 24px;
  border-bottom: 2px solid #2d6a4f;
  margin-bottom: 20px;
}
.confirm-header .check-icon {
  font-size: 48px;
  margin-bottom: 8px;
}
.confirm-header h2 {
  font-size: 22px;
  color: #2d6a4f;
  margin-bottom: 6px;
}
.confirm-header p { font-size: 14px; color: #555; }
.confirm-table th { background: #555; }
.confirm-tfoot td {
  font-weight: 600;
  background: #f5f5f5;
}
.confirm-tfoot .grand-total td {
  font-size: 16px;
  font-weight: 700;
  color: #c0392b;
  background: #fff8f8;
}
.action-btns {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.print-btn {
  flex: 1;
  padding: 12px;
  background: #2d6a4f;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.new-order-btn {
  flex: 1;
  padding: 12px;
  background: #fff;
  color: #2d6a4f;
  border: 2px solid #2d6a4f;
  border-radius: 4px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

/* ---- PRINT ---- */
@media print {
  body { background: #fff; padding: 0; }
  .container { border: none; padding: 10px; }
  #form-view { display: none !important; }
  #confirm-view { display: block !important; }
  .action-btns, .sticky-bar { display: none !important; }
  .confirm-header .check-icon { font-size: 28px; }
  .confirm-header h2 { font-size: 16px; }
}

/* ---- STICKY TOTAL BAR ---- */
.sticky-bar {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #1a3d2b;
  color: #fff;
  padding: 11px 20px;
  z-index: 300;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 -3px 12px rgba(0,0,0,.25);
}
.sticky-bar .sticky-label {
  font-size: 12px;
  opacity: .8;
  font-weight: 400;
}
.sticky-bar .sticky-amount {
  font-size: 20px;
  font-weight: 700;
  color: #f9d71c;
}

/* ---- TABLE WRAPPER ---- */
.table-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 20px;
  border-radius: 4px;
}
.table-wrapper table { margin-bottom: 0; }

/* ---- TABLET (≤ 820px) ---- */
@media (max-width: 820px) {
  body { padding: 10px 8px 68px; }
  .container { padding: 20px 16px; }
  .sticky-bar { display: flex; }

  /* 隱藏「建議售價」欄 */
  #order-table th.col-msrp,
  #order-table td.col-msrp { display: none; }

  /* 更大觸控區域 */
  th, td { padding: 8px 6px; }
  input[type="number"] {
    width: 72px;
    font-size: 16px;
    padding: 7px 4px;
    border-radius: 6px;
  }
  .form-group input {
    padding: 11px 12px;
    font-size: 15px;
    border-radius: 6px;
  }
  .submit-btn { padding: 16px; font-size: 17px; border-radius: 6px; }
  .print-btn, .new-order-btn { padding: 14px; font-size: 15px; }
}

/* ---- MOBILE (≤ 520px) ---- */
@media (max-width: 520px) {
  body { padding: 0 0 68px; background: #f0f0f0; }
  .container { padding: 14px 10px; border: none; border-radius: 0; }

  /* Header */
  .page-header { flex-direction: column; gap: 8px; }
  .page-header h1 { font-size: 17px; }
  .contact-box { text-align: left; font-size: 11px; line-height: 1.7; }
  .deadline-badge { font-size: 11px; }

  /* 卡片式商品列 */
  .table-wrapper { overflow: visible; border-radius: 0; margin-bottom: 10px; }
  #order-table { display: block; }
  #order-table thead { display: none; }
  #order-table tbody { display: flex; flex-direction: column; gap: 8px; }
  #order-table tbody tr {
    display: grid;
    grid-template-columns: 20px 1fr auto auto;
    grid-template-rows: auto auto;
    column-gap: 8px;
    row-gap: 5px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px 12px;
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  #order-table tbody tr:nth-child(even) { background: #f9fdf9; }
  #order-table td { border: none; padding: 0; vertical-align: middle; }

  /* 商品編號 */
  #order-table td.col-num {
    grid-row: 1; grid-column: 1;
    font-size: 10px; color: #bbb;
    align-self: center; line-height: 1;
  }
  /* 品名 */
  #order-table td.product-name {
    grid-row: 1; grid-column: 2 / -1;
    font-weight: 700; font-size: 13.5px;
    line-height: 1.45; align-self: center;
    color: #1a1a1a;
  }
  /* 建議售價（隱藏）*/
  #order-table td.col-msrp { display: none; }
  /* 優惠價 */
  #order-table td.col-price {
    grid-row: 2; grid-column: 2;
    color: #c0392b; font-weight: 700; font-size: 14px;
    align-self: center;
  }
  #order-table td.col-price::before {
    content: '優惠價 ';
    font-size: 10px; color: #999; font-weight: 400;
    display: block; line-height: 1.2;
  }
  /* 數量輸入 */
  #order-table td.col-qty { grid-row: 2; grid-column: 3; align-self: center; }
  input[type="number"] {
    width: 66px; font-size: 17px;
    padding: 7px 4px; border-radius: 8px;
    border: 1.5px solid #bbb;
  }
  input[type="number"]:focus { border-color: #2d6a4f; }
  /* 小計 */
  #order-table td.subtotal-cell {
    grid-row: 2; grid-column: 4;
    text-align: right; font-size: 13px;
    align-self: center; min-width: 0; color: #2d6a4f;
  }
  #order-table td.subtotal-cell::before {
    content: '= ';
    color: #bbb; font-weight: 400; font-size: 11px;
  }

  /* 總計區塊 */
  .total-section { padding: 12px 14px; border-radius: 8px; }
  .total-row.grand .value { font-size: 20px; }

  /* 表單 */
  .form-group input { padding: 12px 12px; font-size: 16px; border-radius: 8px; }
  .submit-btn { padding: 16px; font-size: 16px; border-radius: 10px; }

  /* 確認頁按鈕直排 */
  .action-btns { flex-direction: column; gap: 10px; }
  .print-btn, .new-order-btn { width: 100%; padding: 14px; border-radius: 8px; }
  .confirm-header h2 { font-size: 18px; }
  .confirm-header .check-icon { font-size: 36px; }
}
</style>
</head>

];

// -------- 建立商品列 --------
const tbody = document.getElementById('product-tbody');
PRODUCTS.forEach(p => {
  const tr = document.createElement('tr');
  tr.innerHTML =
    `<td class="col-num">${p.id}</td>` +
    `<td class="product-name">${p.name}</td>` +
    `<td class="col-msrp">${p.msrp.toLocaleString()}</td>` +
    `<td class="col-price sale-price">${p.price.toLocaleString()}</td>` +
    `<td class="col-qty"><input type="number" id="qty_${p.id}" min="0" value="" placeholder="0" oninput="calcTotal()" onclick="this.select()"></td>` +
    `<td class="subtotal-cell" id="sub_${p.id}">—</td>`;
  tbody.appendChild(tr);
});

// -------- 即時計算 --------
function calcTotal() {
  let subtotal = 0;
  PRODUCTS.forEach(p => {
    const qty = parseInt(document.getElementById(`qty_${p.id}`).value) || 0;
    const sub = qty * p.price;
    const cell = document.getElementById(`sub_${p.id}`);
    cell.textContent = qty > 0 ? sub.toLocaleString() : '—';
    subtotal += sub;
  });

  document.getElementById('subtotal-display').textContent = `NT$ ${subtotal.toLocaleString()}`;
  document.getElementById('total-display').textContent = `NT$ ${subtotal.toLocaleString()}`;
  // 更新底部浮動列
  const stickyEl = document.getElementById('sticky-amount');
  if (stickyEl) stickyEl.textContent = `NT$ ${subtotal.toLocaleString()}`;
}

// -------- 送出訂單 --------
function submitOrder() {
  const name    = document.getElementById('inp-name').value.trim();
  const phone   = document.getElementById('inp-phone').value.trim();
  const address = document.getElementById('inp-address').value.trim();
  const remarks = document.getElementById('inp-remarks').value.trim();
  const errEl   = document.getElementById('error-msg');

  if (!name)  { errEl.textContent = '⚠️ 請填寫姓名'; return; }
  if (!phone) { errEl.textContent = '⚠️ 請填寫手機號碼'; return; }

  const orderedItems = PRODUCTS.filter(p => (parseInt(document.getElementById(`qty_${p.id}`).value) || 0) > 0);
  if (orderedItems.length === 0) { errEl.textContent = '⚠️ 請至少選購一項商品'; return; }
  errEl.textContent = '';

  let subtotal = 0;
  const items = orderedItems.map(p => {
    const qty = parseInt(document.getElementById(`qty_${p.id}`).value) || 0;
    const sub = qty * p.price;
    subtotal += sub;
    return { id: p.id, name: p.name, price: p.price, qty, sub };
  });
  const shipping = 0;
  const total    = subtotal;

  // 所有商品數量（39欄，供 Google Sheets 統計用）
  const allQtys = PRODUCTS.map(p => parseInt(document.getElementById(`qty_${p.id}`).value) || 0);

  const payload = {
    timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
    name, phone, address, remarks,
    qtys: allQtys,
    subtotal, shipping, total
  };

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中，請稍候…';

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    showConfirmation({ name, phone, address, items, subtotal, shipping, total });
  })
  .catch(() => {
    errEl.textContent = '⚠️ 網路錯誤，請確認連線後重試';
    btn.disabled = false;
    btn.textContent = '送出訂單';
  });
}

// -------- 顯示確認頁 --------
function showConfirmation({ name, phone, address, items, subtotal, shipping, total }) {
  document.getElementById('form-view').style.display = 'none';
  const sb = document.getElementById('sticky-bar');
  if (sb) sb.style.display = 'none';
  const cv = document.getElementById('confirm-view');
  cv.style.display = 'block';

  let subtitle = `訂購人：${name}　手機：${phone}`;
  if (address) subtitle += `　地址：${address}`;
  document.getElementById('confirm-subtitle').textContent = subtitle;

  const ctbody = document.getElementById('confirm-tbody');
  ctbody.innerHTML = '';
  items.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td style="text-align:left">${item.name}</td>` +
      `<td>${item.price.toLocaleString()}</td>` +
      `<td>${item.qty}</td>` +
      `<td>${item.sub.toLocaleString()}</td>`;
    ctbody.appendChild(tr);
  });

  const tfoot = document.getElementById('confirm-tfoot');
  tfoot.innerHTML =
    `<tr class="grand-total">` +
      `<td colspan="3" style="text-align:right;font-size:16px;font-weight:700">本次總計</td>` +
      `<td style="font-size:18px;font-weight:700;color:#c0392b">NT$ ${total.toLocaleString()}</td>` +
    `</tr>`;

  window.scrollTo(0, 0);
}

// -------- 重填表單 --------
function resetForm() {
  PRODUCTS.forEach(p => {
    document.getElementById(`qty_${p.id}`).value = '';
    document.getElementById(`sub_${p.id}`).textContent = '—';
  });
  ['inp-name','inp-phone','inp-address','inp-remarks'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('subtotal-display').textContent = 'NT$ 0';
  document.getElementById('shipping-display').textContent = 'NT$ 0';
  document.getElementById('total-display').textContent = 'NT$ 0';
  document.getElementById('error-msg').textContent = '';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.textContent = '送出訂單';
  document.getElementById('confirm-view').style.display = 'none';
  document.getElementById('form-view').style.display = 'block';
  const sb2 = document.getElementById('sticky-bar');
  if (sb2) sb2.style.display = '';
  window.scrollTo(0, 0);
}
</script>
